<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilting Maze</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tilting Maze</h1>
    <div id="center">
        <div id="game">
            <div id="maze">
                <div id="end"></div>
            </div>
            <div id="joystick">
                <div class="joystick-arrow"></div>
                <div class="joystick-arrow"></div>
                <div class="joystick-arrow"></div>
                <div class="joystick-arrow"></div>
                <div id="joystick-head"></div>
            </div>
            <div id="note">
                Click the joystick to start the game
                <p>Combine every red ball together and than move it to the center.</p>
                <p>Ready for a hard mode?</p>
                <p>Press H</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
